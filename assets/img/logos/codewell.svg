<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#000"/>
  <!--
    </> symbol matching provided image:
    - Chevrons are tall and narrow (acute angle ~30° from vertical)
    - Vertical span: y=112 to y=388 (276px = 55% of 500)
    - Left chevron: tip at x=105, arms at x=200
    - Slash: from x=228 bottom to x=272 top
    - Right chevron: arms at x=300, tip at x=395
    - Stroke-width 30 with rounded linecap/linejoin
  -->
  <!-- < chevron -->
  <polyline
    points="200,112  105,250  200,388"
    fill="none"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- / slash -->
  <line
    x1="228" y1="388"
    x2="272" y2="112"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
  />
  <!-- > chevron -->
  <polyline
    points="300,112  395,250  300,388"
    fill="none"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
