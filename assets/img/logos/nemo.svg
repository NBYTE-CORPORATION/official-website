<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="60" fill="#0d0d0d"/>
  <!-- Open rounded rectangle: top-right corner is open/missing.
       Path starts at right end of top line, goes counter-clockwise around 3 corners,
       ending at the bottom of the right side (leaving the top-right corner open). -->
  <path
    d="M 340 110
       L 140 110
       Q 100 110 100 150
       L 100 360
       Q 100 400 140 400
       L 360 400
       Q 400 400 400 360
       L 400 170"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
