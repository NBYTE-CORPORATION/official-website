<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#000"/>
  <!--
    Bold 'n' letterform:
    - Left pillar: x=100-193, full height y=100-400
    - Arch: top section, outer-right is a smooth quarter-ellipse D-curve
      Arc from (307,100) to (400,220) with rx=93 ry=120 (center at 400,100)
    - Right pillar: x=307-400, from arch-bottom y=220 to y=400
    - Gap (open at bottom): x=193-307, y=220-400
  -->
  <path d="M 100 400
           L 100 100
           L 307 100
           A 93 120 0 0 0 400 220
           L 400 400
           L 307 400
           L 307 220
           L 193 220
           L 193 400
           Z"
        fill="white"/>
</svg>
